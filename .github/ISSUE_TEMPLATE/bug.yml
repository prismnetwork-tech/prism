name: Bug report
description: Report a reproducible defect.
title: "[bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, user data or undisclosed vulnerabilities.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What failed and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest deterministic reproduction.
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or full commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include sanitized OS, toolchain and deployment details.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized evidence
      render: text
