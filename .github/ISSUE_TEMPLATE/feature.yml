name: Feature proposal
description: Propose a scoped improvement.
title: "[proposal] "
labels: ["proposal", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Describe the concrete user, supplier or operator need.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Explain the interface and behavior.
    validations:
      required: true
  - type: textarea
    id: security
    attributes:
      label: Security and trust impact
      description: Identify new inputs, privileges, assets and failure modes.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What simpler options were considered?
